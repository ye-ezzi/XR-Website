<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요리 모드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: #0f1115; color: #fff; }
    .wrap { min-height: 100dvh; display: flex; flex-direction: column; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.12); }
    .title { font-size: 18px; letter-spacing: .02em; }
    .content { flex: 1; display: grid; place-items: center; padding: 24px; }
    .card { width: min(680px, 92vw); padding: 24px; border-radius: 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); }
    .card h1 { font-size: 24px; margin-bottom: 10px; }
    .card p { opacity: .9; line-height: 1.6; }
    .footer { padding: 16px 20px; font-size: 12px; opacity: .7; text-align: center; }
    a.btn { color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.35); padding: 8px 12px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">요리 모드</div>
      <a href="/" class="btn">홈으로</a>
    </div>
    <div class="content">
      <div class="card">
        <h1>요리 모드가 시작되었습니다</h1>
        <p>여기에 레시피, 단계 안내, 타이머 등 요리 관련 UI를 추가할 수 있습니다.</p>
      </div>
    </div>
    <div class="footer">© 2025 Cooking XR</div>
  </div>
</body>
</html>
