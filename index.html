<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 뷰어</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            overflow: hidden;
        }

        #viewer {
            width: 100vw;
            height: 100vh;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            z-index: 100;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        /* 시작하기 버튼 */
        .start-button {
            position: absolute;
            left: 50%;
            bottom: 100px; /* 하단에서 100px */
            transform: translateX(-50%);
            z-index: 200; /* viewer 및 로딩 위로 */
            padding: 12px 44px; /* 좌우 패딩 +16px */
            border: 1.5px solid rgba(255,255,255,0.95);
            background: transparent;
            color: #fff;
            font-size: 16px;
            line-height: 1;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }
        .start-button:hover,
        .start-button:focus-visible {
            background: rgba(255,255,255,0.1);
            outline: none;
        }
        .start-button:active {
            transform: translateX(-50%) scale(0.98);
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>로딩 중...</div>
    </div>
    <button class="start-button" id="startButton">시작하기</button>
    <script type="module" src="/main.js"></script>
</body>
</html>
